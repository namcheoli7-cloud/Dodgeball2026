<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구리남양주 피구 대회 운영판</title>

<style>
:root{
  --court-bg:#12151b;
  --panel:#1b2028;
  --panel-2:#232a35;
  --line:#33404f;
  --chalk:#eef1f5;
  --chalk-dim:#9aa6b4;
  --out-orange:#ff7a1a;
  --out-orange-dim:#c96419;
  --in-green:#3ecf8e;
  --draw-blue:#5b9bd5;
  --danger:#e5484d;
  --court-yellow:#f4c430;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--court-bg);
  color:var(--chalk);
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(circle at 50% 0%, rgba(255,122,26,0.06), transparent 55%);
}
.mono{font-family:'Consolas','SF Mono',monospace;}
h1,h2,h3{font-family:'Segoe UI',sans-serif;letter-spacing:0.02em;margin:0;}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 80px;}

/* ---- landing ---- */
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;text-align:center;padding:20px;}
.court-mark{width:160px;height:100px;position:relative;}
.court-mark svg{width:100%;height:100%;}
.brand-title{font-size:28px;font-weight:800;letter-spacing:0.03em;}
.brand-title .accent{color:var(--out-orange);}
.brand-sub{color:var(--chalk-dim);font-size:14px;margin-top:4px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;}
.landing .card{width:100%;max-width:380px;}
input,select,button{font-family:inherit;font-size:15px;}
input[type=text],input[type=password],input[type=number]{
  width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--line);
  background:var(--court-bg);color:var(--chalk);margin-bottom:10px;
}
input[type=text]:focus,input[type=password]:focus{outline:2px solid var(--out-orange);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:6px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--chalk);cursor:pointer;font-weight:600;
  transition:background .15s, transform .1s;
}
.btn:hover{background:#2a3240;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--out-orange);border-color:var(--out-orange);color:#1a0f00;}
.btn-primary:hover{background:#ff8c3d;}
.btn-block{width:100%;margin-top:4px;}
.btn-sm{padding:5px 10px;font-size:13px;}
.btn-ghost{background:transparent;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.hr-label{display:flex;align-items:center;gap:10px;color:var(--chalk-dim);font-size:12px;margin:14px 0;}
.hr-label::before,.hr-label::after{content:'';flex:1;height:1px;background:var(--line);}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(18,21,27,0.95);backdrop-filter:blur(6px);z-index:20;}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--out-orange);}
.topbar .meta{color:var(--chalk-dim);font-size:12px;}
.role-badge{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--chalk-dim);}
.role-badge.admin{border-color:var(--out-orange);color:var(--out-orange);}

/* ---- tabs ---- */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:14px 0 10px;}
.tab{padding:8px 16px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--chalk-dim);cursor:pointer;white-space:nowrap;font-weight:600;font-size:13px;}
.tab.active{background:var(--out-orange);color:#1a0f00;border-color:var(--out-orange);}
.subtabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);}
.subtab{padding:8px 14px;color:var(--chalk-dim);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;}
.subtab.active{color:var(--chalk);border-bottom-color:var(--out-orange);}

/* ---- groups / setup ---- */
.section-title{font-size:18px;font-weight:800;margin:24px 0 12px;color:var(--chalk);display:flex;align-items:center;gap:8px;}
.section-title .n{color:var(--out-orange);}
.team-chip-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.team-chip{
  padding:6px 10px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);
  font-size:12.5px;cursor:pointer;user-select:none;color:var(--chalk-dim);
}
.team-chip.selected{border-color:var(--out-orange);color:var(--out-orange);background:rgba(255,122,26,0.08);}
.group-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
.group-card .ghead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.group-card .gname{font-weight:800;font-size:14px;}
.group-teams{display:flex;flex-wrap:wrap;gap:6px;}
.group-team-tag{padding:6px 11px;border-radius:5px;background:var(--panel-2);font-size:13.5px;border:1px solid var(--line);}

/* ---- matches ---- */
.match-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.match-group-label{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.05em;}
.status-pill{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--line);color:var(--chalk-dim);}
.status-pill.done{border-color:var(--in-green);color:var(--in-green);}
.status-pill.live{border-color:var(--out-orange);color:var(--out-orange);}
.teams-row{display:flex;align-items:center;justify-content:center;gap:16px;font-weight:800;font-size:18px;margin-bottom:10px;}
.teams-row .vs{color:var(--chalk-dim);font-size:12px;font-weight:400;}
.teams-row .tname{flex:1;text-align:center;}
.teams-row .tname.winner{color:var(--in-green);}
.sets-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.set-box{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;min-width:110px;text-align:center;}
.set-box .set-label{font-size:10px;color:var(--chalk-dim);margin-bottom:6px;letter-spacing:0.05em;}
.set-pick{display:flex;gap:4px;justify-content:center;}
.set-pick button{flex:1;padding:5px 6px;font-size:11px;border-radius:5px;border:1px solid var(--line);background:var(--court-bg);color:var(--chalk-dim);cursor:pointer;}
.set-pick button.on{background:var(--in-green);border-color:var(--in-green);color:#06231a;font-weight:700;}
.match-actions{display:flex;gap:8px;justify-content:center;margin-top:10px;}

/* ---- standings ---- */
table.standings{width:100%;border-collapse:collapse;font-size:14.5px;}
table.standings th{text-align:left;color:var(--chalk-dim);font-weight:700;font-size:12px;padding:8px 8px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:0.04em;}
table.standings td{padding:8px;border-bottom:1px solid var(--line);}
table.standings tr.advance td{background:rgba(62,207,142,0.16);border-top:1.5px solid rgba(62,207,142,0.5);border-bottom:1.5px solid rgba(62,207,142,0.5);}
table.standings tr.advance td:first-child{border-left:3px solid var(--in-green);}
table.standings tr.advance td:nth-child(2){color:var(--in-green);font-weight:700;}
table.standings td.rank{color:var(--out-orange);font-weight:800;width:26px;}
.reorder-btns{display:flex;gap:2px;}
.reorder-btns button{padding:2px 6px;font-size:10px;}

/* ---- bracket ---- */
.bracket{display:flex;gap:26px;overflow-x:auto;padding:10px 0 30px;}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;gap:16px;min-width:180px;}
.bracket-round-title{font-size:11px;color:var(--chalk-dim);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.bmatch{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12.5px;}
.bslot{display:flex;justify-content:space-between;padding:5px 6px;border-radius:4px;cursor:pointer;}
.bslot.winner{color:var(--in-green);font-weight:700;}
.bslot:hover{background:var(--panel-2);}
.empty-state{text-align:center;padding:40px 20px;color:var(--chalk-dim);}
.empty-state .big{font-size:34px;margin-bottom:8px;}

.division-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:10px;}
.hero{text-align:center;padding:36px 16px 12px;}
.hero-ball{width:64px;height:64px;margin:0 auto 14px;filter:drop-shadow(0 4px 14px rgba(255,122,26,0.35));}
.hero-title{font-size:34px;font-weight:900;letter-spacing:0.01em;line-height:1.25;margin:0 0 8px;}
.hero-title .accent{color:var(--out-orange);}
.hero-sub{color:var(--chalk-dim);font-size:15px;}
@media (max-width:640px){ .hero-title{font-size:26px;} .hero-ball{width:52px;height:52px;} }
.division-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;}
.division-card:hover{border-color:var(--out-orange);}
.division-card .dtitle{font-weight:800;font-size:18px;margin-bottom:5px;}
.division-card .dmeta{font-size:13px;color:var(--chalk-dim);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--out-orange);color:var(--chalk);padding:10px 18px;border-radius:8px;font-size:13px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.small-note{font-size:13px;color:var(--chalk-dim);margin-top:4px;line-height:1.5;}
@media (max-width:640px){
  .teams-row{font-size:14px;gap:8px;}
  .set-box{min-width:90px;}
}
</style>
</head>

// 프리셋 기준으로 조편성+팀배정+예선대진까지 한번에 만드는 빌더
function buildDivisionData(k){
  const p = DIVISION_PRESETS[k];
  const teams = {};
  p.teams.forEach((t,i)=>{ teams['t'+i+'_'+k] = { name:t, groupId:null }; });

  const groups = {};
  const matches = {};
  const groupDefs = PRESET_GROUPS[k];
  const matchPresets = PRESET_MATCHES[k]||{};
  if(groupDefs){
    const nameToId = {};
    Object.entries(teams).forEach(([id,t])=>{ nameToId[t.name]=id; });
    groupDefs.forEach((g,gi)=>{
      const gid = 'g_preset_'+gi;
      groups[gid] = { name:g.name };
      const teamIds = g.teams.map(name=>nameToId[name]).filter(Boolean);
      teamIds.forEach(id=>{ teams[id].groupId = gid; });

      const fixedMatches = matchPresets[g.name];
      if(fixedMatches){
        // 요강 시간표에 실제로 표기된 순서·방향 그대로 사용
        fixedMatches.forEach((row,idx)=>{
          const [nameA,nameB,time,court] = row;
          const a = nameToId[nameA], b = nameToId[nameB];
          if(!a||!b) return;
          const mid = 'm_'+gid+'_'+idx;
          matches[mid] = {
            groupId:gid, teamA:a, teamB:b, sets:{}, setsToPlay:p.prelimSets, drawAllowed:p.prelimDraw,
            stage:'group', status:'scheduled', createdAt: idx, time: time||null, court: court||null
          };
        });
      } else {
        // 프리셋 순서 데이터가 없는 조는 서킷(라운드로빈) 방식으로 자동 생성
        let arr = teamIds.slice();
        if(arr.length%2===1) arr.push(null);
        const n=arr.length, rounds=n-1, half=n/2;
        let rot=arr.slice(); let idx=0;
        for(let r=0;r<rounds;r++){
          for(let i=0;i<half;i++){
            const a=rot[i], b=rot[n-1-i];
            if(a && b){
              const mid = 'm_'+gid+'_'+(idx++);
              matches[mid] = {
                groupId:gid, teamA:a, teamB:b, sets:{}, setsToPlay:p.prelimSets, drawAllowed:p.prelimDraw,
                stage:'group', status:'scheduled', createdAt: idx
              };
            }
          }
          rot=[rot[0], ...rot.slice(-1), ...rot.slice(1,-1)];
        }
      }
    });
  }
  return { label:p.label, groups, teams, matches, bracket:{}, bracketLocked:false };
}

// ============================================================
// 1) 조편성 (설정)
// ============================================================
function renderSetup(k,div){
  const teams = div.teams||{};
  const groups = div.groups||{};

  let html = `<div class="section-title">조편성</div>`;
  Object.entries(groups).forEach(([gid,g])=>{
    const gTeams = Object.entries(teams).filter(([id,t])=>t.groupId===gid);
    html += `<div class="group-card">
      <div class="ghead"><div class="gname">${g.name}</div></div>
      <div class="group-teams">${gTeams.map(([id,t])=>`<div class="group-team-tag">${t.name}</div>`).join('')}</div>
    </div>`;
  });
  if(Object.keys(groups).length===0) html += `<div class="small-note">아직 편성된 조가 없습니다.</div>`;
  return html;
}

// ============================================================
// 2) 예선 경기
// ============================================================
function renderMatches(k,div){
  const groups = div.groups||{};
  const matches = div.matches||{};
  const groupMatches = Object.entries(matches).filter(([id,m])=>m.stage==='group');
  if(groupMatches.length===0){
    return `<div class="empty-state"><div class="big">🤾</div>조편성 탭에서 조를 만들고 대진을 생성하세요.</div>`;
  }
  if(!window._collapsedGroups) window._collapsedGroups = new Set();
  let html='';
  Object.entries(groups).forEach(([gid,g])=>{
    const ms = groupMatches.filter(([id,m])=>m.groupId===gid).sort((a,b)=>a[1].createdAt-b[1].createdAt);
    if(ms.length===0) return;
    const key = k+'_'+gid;
    const collapsed = window._collapsedGroups.has(key);
    html += `<div class="section-title group-toggle" onclick="toggleGroupCollapse('${key}')" style="cursor:pointer;user-select:none;">
      <span style="display:inline-block;transition:transform .15s;transform:rotate(${collapsed?'-90deg':'0deg'});">▾</span> ${g.name}
      <span style="color:var(--chalk-dim);font-weight:400;font-size:13px;">(${ms.length}경기)</span>
    </div>`;
    if(!collapsed){
      ms.forEach(([mid,m])=>{ html += renderMatchCard(k,mid,m,div); });
    }
  });
  return html;
}
window.toggleGroupCollapse = function(key){
  if(!window._collapsedGroups) window._collapsedGroups = new Set();
  if(window._collapsedGroups.has(key)) window._collapsedGroups.delete(key);
  else window._collapsedGroups.add(key);
  paintMain();
};

function teamName(div,id){ return id && div.teams && div.teams[id] ? div.teams[id].name : (id? id : '미정'); }

function renderMatchCard(k,mid,m,div){
  const isAdmin = state.role==='admin';
  const nameA = teamName(div,m.teamA), nameB = teamName(div,m.teamB);
  const sets = m.sets||{};
  const setCount = m.setsToPlay||2;
  let winsA=0, winsB=0;
  for(let i=0;i<setCount;i++){ const s=sets[i]; if(s==='A') winsA++; else if(s==='B') winsB++; }
  let status='scheduled', winner=null;
  const decided = !m.drawAllowed ? (winsA>Math.floor(setCount/2) || winsB>Math.floor(setCount/2)) : (winsA+winsB===setCount);
  if(winsA+winsB>0) status='live';
  if(decided && (winsA+winsB)>0){
    status='done';
    if(winsA>winsB) winner='A'; else if(winsB>winsA) winner='B'; else winner='draw';
  }
  let html = `<div class="match-card">
    <div class="match-top">
      <span class="match-group-label">${m.stage==='bracket'?(m.roundLabel||'본선'):'예선'}${m.time?' · '+m.time:''}${m.court?' · '+m.court+'코트':''}</span>
      <span class="status-pill ${status}">${status==='done'?'종료':status==='live'?'진행중':'예정'}</span>
    </div>`;
  if(m.stage==='group' && isAdmin){
    html += `<input type="text" value="${m.court||''}" placeholder="코트 번호 (예: 1)" onchange="setMatchCourt('${k}','${mid}',this.value)" style="width:100%;margin-bottom:8px;padding:6px 8px;background:var(--court-bg);color:var(--chalk);border:1px solid var(--line);border-radius:6px;font-size:12px;">`;
  }
  html += `<div class="teams-row">
      <span class="tname ${winner==='A'?'winner':''}">${nameA}</span>
      <span class="vs">VS</span>
      <span class="tname ${winner==='B'?'winner':''}">${nameB}</span>
    </div>`;
  if(m.teamA && m.teamB){
    html += `<div class="sets-row">`;
    for(let i=0;i<setCount;i++){
      const cur = sets[i];
      html += `<div class="set-box">
        <div class="set-label">SET ${i+1}</div>
        <div class="set-pick">
          <button class="${cur==='A'?'on':''}" ${isAdmin?`onclick="setSetResult('${k}','${mid}',${i},'A')"`:'disabled'}>${nameA.slice(0,4)}</button>
          <button class="${cur==='B'?'on':''}" ${isAdmin?`onclick="setSetResult('${k}','${mid}',${i},'B')"`:'disabled'}>${nameB.slice(0,4)}</button>
        </div>
      </div>`;
    }
    html += `</div>`;
    if(winner==='draw' && status==='done'){
      html += `<div class="small-note" style="text-align:center;">세트 무승부 — 승점 1:1 처리됩니다.</div>`;
    }
    if(isAdmin && m.stage==='bracket' && (winsA+winsB===setCount) && winsA===winsB){
      html += `<div class="match-actions">
        <span class="small-note">동률! 연장전/골든볼 결과로 승자를 지정하세요:</span>
      </div>
      <div class="match-actions">
        <button class="btn btn-sm" onclick="forceWinner('${k}','${mid}','A')">${nameA} 승</button>
        <button class="btn btn-sm" onclick="forceWinner('${k}','${mid}','B')">${nameB} 승</button>
      </div>`;
    }
    if(isAdmin){
      html += `<div class="match-actions"><button class="btn btn-ghost btn-sm" onclick="resetMatch('${k}','${mid}')">경기 초기화</button></div>`;
    }
  } else {
    html += `<div class="small-note" style="text-align:center;">대진 확정 대기중</div>`;
  }
  html += `</div>`;
  return html;
}

// ============================================================
// 3) 순위표
// ============================================================
function computeStandings(k,div,gid){
  const teams = Object.entries(div.teams||{}).filter(([id,t])=>t.groupId===gid);
  const matches = Object.entries(div.matches||{}).filter(([id,m])=>m.groupId===gid && m.stage==='group');
  const table = {};
  teams.forEach(([id,t])=>{ table[id]={id,name:t.name,played:0,win:0,draw:0,lose:0,pts:0,setScore:0}; });

  matches.forEach(([mid,m])=>{
    if(!m.teamA||!m.teamB) return;
    const sets = m.sets||{};
    const setCount = m.setsToPlay||2;
    let winsA=0,winsB=0, playedSets=0;
    for(let i=0;i<setCount;i++){ const s=sets[i]; if(s){ playedSets++; if(s==='A')winsA++; else winsB++; } }
    if(playedSets===0) return;
    const decided = !m.drawAllowed ? (winsA>Math.floor(setCount/2)||winsB>Math.floor(setCount/2)) : (playedSets===setCount);
    if(!decided) return;
    const A=table[m.teamA], B=table[m.teamB];
    if(!A||!B) return;
    A.played++; B.played++;
    A.setScore += winsA; B.setScore += winsB;
    if(winsA>winsB){ A.win++; A.pts+=3; B.lose++; }
    else if(winsB>winsA){ B.win++; B.pts+=3; A.lose++; }
    else { A.draw++; B.draw++; A.pts+=1; B.pts+=1; }
  });

  // 승점으로만 자동 정렬합니다. 승점이 같으면(총 내야 득점수·승자승·연장전·골든볼 등
  // 앱이 직접 판단할 수 없는 기준이므로) 순서를 강제하지 않고 관리자가 직접 조정합니다.
  let arr = Object.values(table);
  arr.sort((a,b)=> b.pts-a.pts);
  return arr;
}

// 화면에 실제로 보여줄 순위: 승점 자동정렬 + 저장된 수동 순서(manualOrder)를 반영
function getDisplayStandings(k,div,gid){
  const base = computeStandings(k,div,gid);
  const manualOrder = div.groups && div.groups[gid] && div.groups[gid].manualOrder;
  if(!manualOrder) return base;
  const byId = {}; base.forEach(r=>{ byId[r.id]=r; });
  const ordered = manualOrder.map(id=>byId[id]).filter(Boolean);
  base.forEach(r=>{ if(!manualOrder.includes(r.id)) ordered.push(r); });
  return ordered;
}

function renderStandings(k,div){
  const groups = div.groups||{};
  if(Object.keys(groups).length===0) return `<div class="empty-state"><div class="big">📊</div>조를 먼저 편성하세요.</div>`;
  const preset = DIVISION_PRESETS[k];
  let html = `<div class="small-note">승점(승3·무1·패0)으로 자동 정렬됩니다. ${state.role==='admin'?'승점이 같은 팀끼리는 앱이 임의로 순서를 매기지 않으니, 총 내야 득점수·승자승·연장전/골든볼 결과를 보고 아래 화살표로 직접 순서를 조정하세요.':'승점이 같은 팀의 순서는 운영단이 직접 조정합니다.'}</div>`;
  Object.entries(groups).forEach(([gid,g])=>{
    const rows = getDisplayStandings(k,div,gid);
    if(rows.length===0) return;
    const adv = Math.min(preset.advancePerGroup, rows.length);
    const hasTie = rows.some((r,i)=> i>0 && r.pts===rows[i-1].pts);
    html += `<div class="section-title">${g.name} 순위 ${hasTie && state.role==='admin' ? '<span style="color:var(--out-orange);font-weight:400;font-size:11px;">⚠ 동률 있음 · 순서 확인 필요</span>':''}</div>
    <table class="standings"><thead><tr>
      <th></th><th>학교</th><th>경기</th><th>승</th><th>무</th><th>패</th><th>승점</th><th>세트득실(참고)</th>${state.role==='admin'?'<th>순서조정</th>':''}
    </tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const tied = (i>0 && r.pts===rows[i-1].pts) || (i<rows.length-1 && r.pts===rows[i+1].pts);
      const canUp = i>0 && rows[i-1].pts===r.pts;
      const canDown = i<rows.length-1 && rows[i+1].pts===r.pts;
      html += `<tr class="${i<adv?'advance':''}">
        <td class="rank">${i+1}</td><td>${r.name}${tied?' <span style="color:var(--out-orange);">•</span>':''}</td><td>${r.played}</td><td>${r.win}</td><td>${r.draw}</td><td>${r.lose}</td><td>${r.pts}</td><td>${r.setScore}</td>
        ${state.role==='admin'?`<td class="reorder-btns">
          <button class="btn btn-sm" ${canUp?'':'disabled'} onclick="manualReorder('${k}','${gid}',${i},-1)">↑</button>
          <button class="btn btn-sm" ${canDown?'':'disabled'} onclick="manualReorder('${k}','${gid}',${i},1)">↓</button>
        </td>`:''}
      </tr>`;
    });
    html += `</tbody></table><div class="small-note">진출: 상위 ${adv}팀 (초록 강조)</div>`;
  });
  return html;
}

// 수동 순위 오버라이드: 승점이 같은 팀끼리만 순서를 바꿀 수 있습니다
window.manualReorder = function(k,gid,idx,dir){
  const div = state.data.divisions[k];
  const rows = getDisplayStandings(k,div,gid);
  const j = idx+dir;
  if(j<0||j>=rows.length) return;
  if(rows[idx].pts !== rows[j].pts){ toast('승점이 다른 팀끼리는 순서를 바꿀 수 없습니다'); return; }
  const ids = rows.map(r=>r.id);
  [ids[idx],ids[j]]=[ids[j],ids[idx]];
  db.ref(`tournaments/${state.code}/divisions/${k}/groups/${gid}/manualOrder`).set(ids);
};

// ============================================================
// 4) 본선 대진
// ============================================================
function isGroupStageComplete(k,div){
  const groups = Object.keys(div.groups||{});
  if(groups.length===0) return false;
  const groupMatches = Object.entries(div.matches||{}).filter(([id,m])=>m.stage==='group');
  if(groupMatches.length===0) return false;
  return groupMatches.every(([id,m])=>{
    if(!m.teamA||!m.teamB) return true;
    const sets=m.sets||{}; const setCount=m.setsToPlay||2;
    let played=0,winsA=0,winsB=0;
    for(let i=0;i<setCount;i++){ if(sets[i]){played++; if(sets[i]==='A')winsA++; else winsB++;} }
    const decided = !m.drawAllowed ? (winsA>Math.floor(setCount/2)||winsB>Math.floor(setCount/2)) : (played===setCount);
    return decided;
  });
}

function getAdvancingTeams(k,div){
  const preset = DIVISION_PRESETS[k];
  const groups = Object.entries(div.groups||{});
  let advancers = []; // list of {id,name,groupName,seedRank}
  groups.forEach(([gid,g])=>{
    const order = getDisplayStandings(k,div,gid);
    const n = Math.min(preset.advancePerGroup, order.length);
    for(let i=0;i<n;i++){ advancers.push({id:order[i].id, name:order[i].name||teamName(div,order[i].id), groupName:g.name, rank:i+1}); }
  });
  return advancers;
}

function nextPow2(n){ let p=1; while(p<n) p*=2; return p; }

function roundLabelName(r,total){
  const remaining = total-r;
  if(remaining===1) return '결승';
  if(remaining===2) return '4강';
  if(remaining===3) return '8강';
  if(remaining===4) return '16강';
  return remaining+'강';
}

// 운영단이 직접 팀을 배치하는 빈 대진표 생성 (자동 시드 없음)
window.promptCreateBracket = function(k){
  const div = state.data.divisions[k];
  const suggested = Math.max(2, getAdvancingTeams(k,div).length);
  const input = prompt('본선 대진표에 몇 팀이 들어가나요? (부전승 포함, 예: 8, 14, 16)', suggested);
  if(input===null) return;
  const n = parseInt(input);
  if(!n || n<2){ toast('2 이상의 숫자를 입력하세요'); return; }
  const size = nextPow2(n);
  const totalRounds = Math.log2(size);
  const preset = DIVISION_PRESETS[k];
  const bracket = {rounds:{}};
  for(let r=0;r<totalRounds;r++){
    const roundMatches = {};
    const matchCount = size/Math.pow(2,r+1);
    let setsToPlay = preset.bracketSets, drawAllowed = preset.bracketDraw;
    if(r===totalRounds-1 && preset.finalSets){ setsToPlay=preset.finalSets; drawAllowed=preset.finalDraw; }
    for(let i=0;i<matchCount;i++){
      const mid = 'b'+r+'_'+i;
      roundMatches[mid] = {
        teamA:null, teamB:null, sets:{}, setsToPlay, drawAllowed, court:null,
        stage:'bracket', roundIdx:r, roundLabel: roundLabelName(r,totalRounds), status:'scheduled'
      };
    }
    bracket.rounds[r] = roundMatches;
  }
  const updates = {};
  updates[`divisions/${k}/bracket`] = bracket;
  updates[`divisions/${k}/bracketLocked`] = true;
  db.ref('tournaments/'+state.code).update(updates).then(()=>toast('빈 대진표가 만들어졌습니다. 1라운드부터 팀을 배치하세요.'));
};

function bracketTeamOptions(div){
  return Object.entries(div.teams||{}).map(([id,t])=>{
    const gName = (div.groups && t.groupId && div.groups[t.groupId]) ? div.groups[t.groupId].name : '';
    return { id, label: t.name + (gName?` (${gName})`:'') };
  }).sort((a,b)=>a.label.localeCompare(b.label,'ko'));
}

window.assignBracketSlot = function(k, roundIdx, mid, slot, teamId){
  const path = `tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${mid}/${slot}`;
  db.ref(path).set(teamId || null);
};

window.setBracketCourt = function(k, roundIdx, mid, value){
  db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${mid}/court`).set(value || null);
};

window.byeAdvance = function(k, roundIdx, mid){
  const div = state.data.divisions[k];
  const m = div.bracket.rounds[roundIdx][mid];
  const winnerId = m.teamA || m.teamB;
  if(!winnerId){ toast('배치된 팀이 없습니다'); return; }
  if(!confirm('한 팀만 배치되어 있습니다. 이 팀을 부전승으로 다음 라운드에 올릴까요?')) return;
  propagateBracketWinner(k, roundIdx, mid, winnerId);
};

function renderBracket(k,div){
  const hasBracket = div.bracket && div.bracket.rounds && Object.keys(div.bracket.rounds).length>0;
  const isAdmin = state.role==='admin';
  let html='';
  if(!hasBracket){
    if(!isAdmin){
      html += `<div class="empty-state"><div class="big">🏆</div>아직 본선 대진표가 만들어지지 않았습니다.</div>`;
      return html;
    }
    const advancers = getAdvancingTeams(k,div);
    html += `<div class="empty-state">
      <div class="big">🏆</div>
      대진표를 만들고 직접 팀을 배치하세요. (예선 진행 상황과 상관없이 언제든 만들 수 있습니다${advancers.length?`, 현재 예선 기준 진출 예상 ${advancers.length}팀`:''})
      <div style="margin-top:14px;"><button class="btn btn-primary" onclick="promptCreateBracket('${k}')">본선 대진표 만들기</button></div>
    </div>`;
    return html;
  }
  const rounds = div.bracket.rounds;
  const roundKeys = Object.keys(rounds).map(Number).sort((a,b)=>a-b);
  const teamOptions = isAdmin ? bracketTeamOptions(div) : [];
  html += `<div class="bracket">`;
  roundKeys.forEach(rIdx=>{
    const matches = Object.entries(rounds[rIdx]);
    html += `<div class="bracket-round">
      <div class="bracket-round-title">${matches[0][1].roundLabel}</div>`;
    matches.forEach(([mid,m])=>{
      const nameA = m.teamA? teamName(div,m.teamA) : null;
      const nameB = m.teamB? teamName(div,m.teamB) : null;
      const sets = m.sets||{};
      const setCount = m.setsToPlay||3;
      let winsA=0,winsB=0;
      for(let i=0;i<setCount;i++){ if(sets[i]==='A')winsA++; if(sets[i]==='B')winsB++; }
      const winner = winsA>winsB && winsA>Math.floor(setCount/2) ? 'A' : (winsB>winsA && winsB>Math.floor(setCount/2) ? 'B' : null);
      const canEditSlots = isAdmin && rIdx===0; // 팀 배치는 1라운드에서만 직접 지정, 이후는 승자 자동 진출
      html += `<div class="bmatch">`;
      if(canEditSlots && !m.teamA){
        html += `<select class="bslot-select" onchange="assignBracketSlot('${k}',${rIdx},'${mid}','teamA',this.value)" style="width:100%;margin-bottom:4px;padding:4px;background:var(--court-bg);color:var(--chalk);border:1px solid var(--line);border-radius:4px;font-size:12px;">
          <option value="">팀 선택...</option>
          ${teamOptions.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}
        </select>`;
      } else {
        html += `<div class="bslot ${winner==='A'?'winner':''}">${nameA||'미정'} ${canEditSlots?`<a href="javascript:void(0)" onclick="assignBracketSlot('${k}',${rIdx},'${mid}','teamA','')" style="color:var(--danger);float:right;">✕</a>`:''}</div>`;
      }
      if(canEditSlots && !m.teamB){
        html += `<select class="bslot-select" onchange="assignBracketSlot('${k}',${rIdx},'${mid}','teamB',this.value)" style="width:100%;margin-bottom:4px;padding:4px;background:var(--court-bg);color:var(--chalk);border:1px solid var(--line);border-radius:4px;font-size:12px;">
          <option value="">팀 선택...</option>
          ${teamOptions.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}
        </select>`;
      } else {
        html += `<div class="bslot ${winner==='B'?'winner':''}">${nameB||'미정'} ${canEditSlots?`<a href="javascript:void(0)" onclick="assignBracketSlot('${k}',${rIdx},'${mid}','teamB','')" style="color:var(--danger);float:right;">✕</a>`:''}</div>`;
      }
      if(isAdmin){
        html += `<input type="text" value="${m.court||''}" placeholder="코트" onchange="setBracketCourt('${k}',${rIdx},'${mid}',this.value)" style="width:100%;margin-top:6px;padding:4px 6px;background:var(--court-bg);color:var(--chalk);border:1px solid var(--line);border-radius:4px;font-size:12px;">`;
      } else if(m.court){
        html += `<div class="small-note" style="text-align:center;margin-top:4px;">코트 ${m.court}</div>`;
      }
      if(isAdmin && m.teamA && m.teamB){
        html += `<div style="margin-top:6px;"><button class="btn btn-sm btn-block" onclick="openBracketMatch('${k}','${mid}')">경기 결과 입력</button></div>`;
      } else if(isAdmin && (m.teamA||m.teamB) && !(m.teamA&&m.teamB) && rounds[rIdx+1]){
        html += `<div style="margin-top:6px;"><button class="btn btn-sm btn-block btn-ghost" onclick="byeAdvance('${k}',${rIdx},'${mid}')">부전승으로 진출</button></div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  if(isAdmin){
    html += `<button class="btn btn-ghost btn-sm" onclick="regenConfirm('${k}')">대진표 초기화하고 새로 만들기</button>`;
  }
  html += `<div id="bracketMatchModal"></div>`;
  return html;
}

window.regenConfirm = function(k){
  if(confirm('본선 대진표를 초기화하면 배치된 팀과 결과가 모두 사라집니다. 계속할까요?')) promptCreateBracket(k);
};

window.openBracketMatch = function(k,mid){
  const div = state.data.divisions[k];
  const roundIdx = mid.split('_')[0].replace('b','');
  const m = div.bracket.rounds[roundIdx][mid];
  const modal = document.createElement('div');
  modal.style.position='fixed'; modal.style.inset='0'; modal.style.background='rgba(18,21,27,0.92)'; modal.style.zIndex='60';
  modal.style.display='flex'; modal.style.alignItems='center'; modal.style.justifyContent='center'; modal.style.padding='20px';
  modal.innerHTML = `<div class="card" style="max-width:420px;width:100%;">
    <div class="flex-between" style="margin-bottom:10px;"><strong>${m.roundLabel} 경기 결과</strong><button class="btn btn-ghost btn-sm" onclick="this.closest('div[style*=fixed]').remove()">✕</button></div>
    <div id="bracketCardHost"></div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('bracketCardHost').innerHTML = renderMatchCard(k, 'BRACKET:'+roundIdx+':'+mid, m, div);

// setSetResult / forceWinner / resetMatch 는 그룹경기와 본선경기 mid 포맷이 다르므로 분기
window.setMatchCourt = function(k,mid,value){
  db.ref(`tournaments/${state.code}/divisions/${k}/matches/${mid}/court`).set(value || null);
};
window.setSetResult = function(k,mid,setIdx,winner){
  if(mid.startsWith('BRACKET:')){
    const [,roundIdx,realMid] = mid.split(':');
    db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${realMid}/sets/${setIdx}`).set(winner)
      .then(()=>{ propagateBracketWinner(k,roundIdx,realMid); refreshBracketModal(k,mid); });
    return;
  }
  db.ref(`tournaments/${state.code}/divisions/${k}/matches/${mid}/sets/${setIdx}`).set(winner);
};
window.forceWinner = function(k,mid,winner){
  if(mid.startsWith('BRACKET:')){
    const [,roundIdx,realMid] = mid.split(':');
    const m = state.data.divisions[k].bracket.rounds[roundIdx][realMid];
    db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${realMid}/sets/${m.setsToPlay}`).set(winner)
      .then(()=>{
        db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${realMid}/setsToPlay`).set(m.setsToPlay+1);
        setTimeout(()=>{ propagateBracketWinner(k,roundIdx,realMid); refreshBracketModal(k,mid); },300);
      });
    return;
  }
  const div = state.data.divisions[k];
  const m = div.matches[mid];
  db.ref(`tournaments/${state.code}/divisions/${k}/matches/${mid}/sets/${m.setsToPlay}`).set(winner)
    .then(()=>{ db.ref(`tournaments/${state.code}/divisions/${k}/matches/${mid}/setsToPlay`).set(m.setsToPlay+1); });
};
window.resetMatch = function(k,mid){
  if(mid.startsWith('BRACKET:')){
    const [,roundIdx,realMid] = mid.split(':');
    db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${roundIdx}/${realMid}/sets`).set(null);
    return;
  }
  db.ref(`tournaments/${state.code}/divisions/${k}/matches/${mid}/sets`).set(null);
};
function refreshBracketModal(k,mid){
  if(!window._bracketModal) return;
  const [,roundIdx,realMid] = mid.split(':');
  setTimeout(()=>{
    const div = state.data.divisions[k];
    if(!div.bracket || !div.bracket.rounds[roundIdx]) return;
    const m = div.bracket.rounds[roundIdx][realMid];
    const host = document.getElementById('bracketCardHost');
    if(host) host.innerHTML = renderMatchCard(k, mid, m, div);
  },200);
}

function propagateBracketWinner(k,roundIdx,mid,forcedWinnerId){
  const div = state.data.divisions[k];
  const rounds = div.bracket.rounds;
  const m = rounds[roundIdx][mid];
  let winnerId = forcedWinnerId;
  if(!winnerId){
    const setCount = m.setsToPlay||3;
    const sets = m.sets||{};
    let winsA=0,winsB=0,played=0;
    for(let i=0;i<setCount;i++){ if(sets[i]){played++; if(sets[i]==='A')winsA++; else winsB++;} }
    const decided = !m.drawAllowed ? (winsA>Math.floor(setCount/2)||winsB>Math.floor(setCount/2)) : (played===setCount && winsA!==winsB);
    if(!decided) return;
    winnerId = winsA>winsB ? m.teamA : m.teamB;
  }
  const nextRoundIdx = parseInt(roundIdx)+1;
  if(!rounds[nextRoundIdx]) return; // 결승이었음
  const idxInRound = parseInt(mid.split('_')[1]);
  const nextMid = 'b'+nextRoundIdx+'_'+Math.floor(idxInRound/2);
  const slot = idxInRound%2===0? 'teamA':'teamB';
  db.ref(`tournaments/${state.code}/divisions/${k}/bracket/rounds/${nextRoundIdx}/${nextMid}/${slot}`).set(winnerId);
}

// ============================================================
render();
</script>
